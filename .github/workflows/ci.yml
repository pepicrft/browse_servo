name: browse_servo

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/rebar3
            ~/.hex
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/browse_servo_native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml', 'native/browse_servo_native/Cargo.lock', 'native/browse_servo_native/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install deps
        run: mix deps.get

      - name: Test
        run: mix test

  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/rebar3
            ~/.hex
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/browse_servo_native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml', 'native/browse_servo_native/Cargo.lock', 'native/browse_servo_native/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install deps
        run: mix deps.get

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/rebar3
            ~/.hex
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted
