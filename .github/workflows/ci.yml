name: lightpanda

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Cache Mix and Zig
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/zigler
            ~/.cache/rebar3
            ~/.hex
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Install Zig
        run: mix zig.get

      - name: Format
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Test
        run: mix test
