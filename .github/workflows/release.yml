name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[Release]')
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
      current_version: ${{ steps.plan.outputs.current_version }}
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      bump_type: ${{ steps.plan.outputs.bump_type }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libfontconfig1-dev pkg-config

      - id: plan
        shell: bash
        run: |
          set -euo pipefail
          current_version=$(perl -ne 'print "$1\n" and exit if /@version "([^"]+)"/' mix.exs)
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)

          if [ -n "$latest_tag" ]; then
            git cliff --context --unreleased > release-context.json
          else
            git cliff --context > release-context.json
          fi

          releaseable_count=$(jq 'if length == 0 then 0 else .[0].commits | length end' release-context.json)

          if [ "$releaseable_count" -eq 0 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if jq -e '.[0].commits[] | select(.message | test("BREAKING CHANGE|!:"))' release-context.json > /dev/null; then
            bump_type=major
          elif jq -e '.[0].commits[] | select(.group == "Features")' release-context.json > /dev/null; then
            bump_type=minor
          else
            bump_type=patch
          fi

          if [ -n "$latest_tag" ]; then
            version=$(elixir -e '
              version = Version.parse!(Enum.at(System.argv(), 0))
              part = Enum.at(System.argv(), 1)

              bumped =
                case part do
                  "major" -> %{version | major: version.major + 1, minor: 0, patch: 0}
                  "minor" -> %{version | minor: version.minor + 1, patch: 0}
                  "patch" -> %{version | patch: version.patch + 1}
                end

              IO.puts(to_string(bumped))
            ' "$latest_tag" "$bump_type")
            git cliff --tag "$version" -o CHANGELOG.next.md
            git cliff --config .github/cliff-release.toml --tag "$version" --unreleased --strip all -o RELEASE_NOTES.md
          else
            version="${current_version%-dev}"
            git cliff --tag "$version" -o CHANGELOG.next.md
            git cliff --config .github/cliff-release.toml --tag "$version" --strip all -o RELEASE_NOTES.md
          fi

          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag already exists: $version" >&2
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
          echo "bump_type=$bump_type" >> "$GITHUB_OUTPUT"

  precompile-native:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    name: NIF ${{ matrix.target }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/rebar3
            ~/.hex
          key: ${{ runner.os }}-${{ matrix.target }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-mix-
            ${{ runner.os }}-mix-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/browse_servo_native/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml', 'native/browse_servo_native/Cargo.lock', 'native/browse_servo_native/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Install deps
        run: mix deps.get

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Build NIF archive
        id: build
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.prepare.outputs.version }}"
          target="${{ matrix.target }}"
          nif_version="2.15"

          cd native/browse_servo_native
          cargo build --release --target "$target"

          lib_prefix="lib"
          lib_suffix=".so"
          final_suffix=".so"

          case "$target" in
            *-apple-darwin)
              lib_suffix=".dylib"
              ;;
            *-pc-windows-*)
              lib_prefix=""
              lib_suffix=".dll"
              final_suffix=".dll"
              ;;
          esac

          lib_name="${lib_prefix}browse_servo_native${lib_suffix}"
          final_name="${lib_prefix}browse_servo_native-v${version}-nif-${nif_version}-${target}${final_suffix}"

          cp "target/${target}/release/${lib_name}" "${final_name}"
          tar -czf "${final_name}.tar.gz" "${final_name}"
          mv "${final_name}.tar.gz" "${GITHUB_WORKSPACE}/"

          echo "file-name=${final_name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "file-path=${final_name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.file-name }}
          path: ${{ steps.build.outputs.file-path }}
          if-no-files-found: error

  publish:
    needs: [prepare, precompile-native]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/rebar3
            ~/.hex
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/browse_servo_native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml', 'native/browse_servo_native/Cargo.lock', 'native/browse_servo_native/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install deps
        run: mix deps.get

      - name: Download NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate changelog
        shell: bash
        run: |
          git cliff --config cliff.toml --tag "${{ needs.prepare.outputs.tag }}" > CHANGELOG.md
          git cliff --config .github/cliff-release.toml --tag "${{ needs.prepare.outputs.tag }}" --unreleased --strip all > RELEASE_NOTES.md

      - name: Update package version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          perl -0pi -e 's/@version "[^"]+"/@version "'"$version"'"/' mix.exs

      - name: Generate checksum file
        shell: bash
        run: |
          set -euo pipefail
          output="checksum-Elixir.BrowseServo.Native.exs"
          {
            echo "%{"
            find release-artifacts -maxdepth 1 -type f -name '*.tar.gz' -print0 | sort -z | while IFS= read -r -d '' file; do
              name="$(basename "$file")"
              hash="$(sha256sum "$file" | awk '{print $1}')"
              printf '  "%s" => "sha256:%s",\n' "$name" "$hash"
            done
            echo "}"
          } > "$output"

      - name: Validate Hex package
        shell: bash
        run: |
          set -euo pipefail
          build_dir="$(mktemp -d)"
          mix hex.build --unpack -o "$build_dir"

      - name: Commit release metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mix.exs CHANGELOG.md checksum-Elixir.BrowseServo.Native.exs
          git commit -m "[Release] BrowseServo ${{ needs.prepare.outputs.version }}"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "${{ needs.prepare.outputs.tag }}"

      - name: Push release commit and tag atomically
        shell: bash
        run: |
          set -euo pipefail
          git push --atomic origin "HEAD:${GITHUB_REF_NAME}" "refs/tags/${{ needs.prepare.outputs.tag }}"

      - name: Publish Hex package
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          : "${HEX_API_KEY:?HEX_API_KEY secret is required}"
          mix hex.publish package --yes

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.tag }}" \
            release-artifacts/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "${{ needs.prepare.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md
