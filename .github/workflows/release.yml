name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  precompile-native:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/rebar3
            ~/.hex
          key: ${{ runner.os }}-${{ matrix.target }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-mix-
            ${{ runner.os }}-mix-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/servox_native/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('mix.lock', 'mix.exs', 'mise.toml', 'native/servox_native/Cargo.lock', 'native/servox_native/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Install deps
        run: mix deps.get

      - name: Build NIF
        run: MIX_ENV=prod RUSTLER_TARGET=${{ matrix.target }} mix compile

      - name: Package artifact
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p artifacts
          find _build/prod/lib/servox/priv/native -type f | while read -r file; do
            base="$(basename "$file")"
            cp "$file" "artifacts/$base"
          done
          cd artifacts
          tar czf "Elixir.Servox.Native-v${VERSION}-${{ matrix.target }}.tar.gz" *

      - name: Upload NIF artifact
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz

  changelog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Generate changelog
        run: git-cliff --config cliff.toml --tag "${GITHUB_REF#refs/tags/v}" > CHANGELOG.md

      - name: Publish release notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
